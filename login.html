<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iskolar Link Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./styles/login.css">
    <style>


    </style>
</head>

<body>

    <div class="container login-container">
        <div class="row align-items-center">

            <div class="col-md-6 left-side">
                <img src="../assets/ISKLINKsquare.png" alt="Logo" class="left-img-logo">
            </div>

            <div class="col-md-6">
                <div class="card shadow">

                    <ul class="nav nav-tabs mb-3">
                        <li class="nav-item">
                            <a class="nav-link active" href="#">Sign In</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="#">Create Account</a>
                        </li>
                    </ul>

                    <h4 class="fw-bold">Welcome Back</h4>
                    <p class="text-muted">Sign in to your account to continue</p>

                    <div class="mb-3">
                        <label>Email Address</label>
                        <input type="email" class="form-control" placeholder="you@iskolarlink.edu">
                    </div>

                    <div class="mb-2">
                        <label>Password</label>
                        <input type="password" class="form-control" placeholder="Password">
                    </div>

                    <div class="text-end mb-3">
                        <a href="#" class="small">Forgot Password?</a>
                    </div>

                    <button class="btn btn-login w-100 mb-3">Log In</button>

                    <div class="divider">OR</div>

                    <button class="btn btn-outline-secondary w-100 btn-sso">
                        Continue with Single Sign-On
                    </button>

                    <p class="text-center mt-3">
                        Don’t have an account? <a href="#">Create one</a>
                    </p>

                </div>
            </div>

        </div>
    </div>

</body>

</html>
